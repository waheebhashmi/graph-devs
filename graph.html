<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>CELL DEVS SIMULATION AND ANALYSIS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f2f2f2;
    }

    #header {
      background-color: #007BFF;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 24px;
    }

    #content {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: white;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    #tooltip {
      position: absolute;
      visibility: hidden;
      padding: 10px;
      background-color: white;
      border: 1px solid black;
    }

    label {
      display: block;
      margin: 10px 0;
    }

    input[type="file"] {
      margin: 5px 0;
    }

    button#myBtn {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button#myBtn:hover {
      background-color: #0056b3;
    }
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
  <div id="header">CELL DEVS SIMULATION AND ANALYSIS</div>
  <div id="content">
    <div id="tooltip"></div>
    <label for="fileInput">Choose a file to generate a graph (.csv supported)</label>
    <input type="file" id="fileInput">
    <button id="myBtn">Generate Graph</button>
    <svg width="1000" height="1200" id="line-chart"></svg>
  </div>
  <script src="index.js"></script>
</body>

</html>
